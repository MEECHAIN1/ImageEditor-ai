pid        /home/runner/workspace/logs/nginx/nginx.pid;
error_log  /home/runner/workspace/logs/nginx/error.log;

events {}

http {
    access_log /home/runner/workspace/logs/nginx/access.log;

    server {
        listen 5000 ssl;
        server_name rpc.meechain.run.place;

        ssl_certificate     /home/runner/workspace/certbot/live/rpc.meechain.run.place/fullchain.pem;
        ssl_certificate_key /home/runner/workspace/certbot/live/rpc.meechain.run.place/privkey.pem;

        location / {
            proxy_pass http://localhost:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
